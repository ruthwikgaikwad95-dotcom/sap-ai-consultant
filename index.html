<!DOCTYPE html>
<html>
<body>

<h1>SAPilot</h1>

<button onclick="test()">
Test API
</button>

<div id="result"></div>

<script>

async function test(){

const response = await fetch('/api/sap-chat',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
message:'Hello',
module:'all'
})

});

const data = await response.json();

document.getElementById('result').innerHTML =
data.reply;

}

</script>

</body>
</html>
