<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPilot by Ruthwik - SAP AI Consultant</title>

<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
background:#f3f4f6;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#0a6ed1;
color:white;
padding:18px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.header h1{
font-size:28px;
}

.header p{
margin-top:5px;
font-size:14px;
}

.modules{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
background:white;
border-bottom:1px solid #ddd;
}

.module-btn{
padding:10px 16px;
border:none;
border-radius:8px;
background:#e5e7eb;
cursor:pointer;
font-weight:600;
}

.module-btn.active{
background:#0a6ed1;
color:white;
}

.container{
flex:1;
max-width:1100px;
width:100%;
margin:auto;
display:flex;
flex-direction:column;
padding:20px;
}

.chat-box{
flex:1;
background:white;
border-radius:12px;
padding:20px;
overflow-y:auto;
border:1px solid #ddd;
}

.user{
background:#dbeafe;
padding:12px;
border-radius:10px;
margin-bottom:12px;
max-width:85%;
margin-left:auto;
}

.bot{
background:#f1f5f9;
padding:12px;
border-radius:10px;
margin-bottom:12px;
white-space:pre-wrap;
max-width:85%;
}

.input-area{
display:flex;
gap:10px;
margin-top:15px;
}

#question{
flex:1;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

.send-btn{
background:#0a6ed1;
color:white;
border:none;
padding:14px 24px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.send-btn:hover{
background:#0854a0;
}

.footer{
text-align:center;
padding:10px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="header">
<h1>SAPilot 🚀</h1>
<p>AI Powered SAP Functional Consultant</p>
</div>

<div class="modules">

<button class="module-btn active" onclick="setModule(this,'all')">ALL</button>
<button class="module-btn" onclick="setModule(this,'fi')">FI</button>
<button class="module-btn" onclick="setModule(this,'co')">CO</button>
<button class="module-btn" onclick="setModule(this,'sd')">SD</button>
<button class="module-btn" onclick="setModule(this,'mm')">MM</button>
<button class="module-btn" onclick="setModule(this,'pp')">PP</button>
<button class="module-btn" onclick="setModule(this,'pm')">PM</button>
<button class="module-btn" onclick="setModule(this,'ps')">PS</button>
<button class="module-btn" onclick="setModule(this,'s4')">S/4</button>

</div>

<div class="container">

<div id="chat" class="chat-box">

<div class="bot">
Welcome to SAPilot.

Ask any SAP question related to FI, CO, SD, MM, PP, PM, PS or S/4HANA.
</div>

</div>

<div class="input-area">

<input
type="text"
id="question"
placeholder="Ask your SAP question..."
onkeypress="if(event.key==='Enter') sendMessage()">

<button class="send-btn" onclick="sendMessage()">
Send
</button>

</div>

</div>

<div class="footer">
SAPilot MVP Version 1
</div>

<script>

let currentModule='all';

function setModule(button,module){

currentModule=module;

document.querySelectorAll('.module-btn')
.forEach(btn=>btn.classList.remove('active'));

button.classList.add('active');

}

async function sendMessage(){

const input=document.getElementById('question');
const question=input.value.trim();

if(!question){
return;
}

const chat=document.getElementById('chat');

chat.innerHTML += `
<div class="user">${question}</div>
`;

const loadingId='load'+Date.now();

chat.innerHTML += `
<div class="bot" id="${loadingId}">
Thinking...
</div>
`;

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch('/api/sap-chat',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
message:question,
module:currentModule
})

});

const data=await response.json();

const loading=document.getElementById(loadingId);

if(loading){
loading.remove();
}

chat.innerHTML += `
<div class="bot">${data.reply || 'No response received.'}</div>
`;

chat.scrollTop=chat.scrollHeight;

input.value='';

}catch(error){

const loading=document.getElementById(loadingId);

if(loading){
loading.innerHTML='Unable to connect to SAPilot API.';
}

}

}

</script>

</body>
</html>
