```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPilot - SAP AI Consultant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0a6ed1;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin-bottom:5px;
}

.modules{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
background:white;
border-bottom:1px solid #ddd;
}

.module-btn{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#e5e7eb;
font-weight:bold;
}

.module-btn.active{
background:#0a6ed1;
color:white;
}

.container{
max-width:1000px;
margin:20px auto;
padding:15px;
}

#chat{
background:white;
height:500px;
overflow-y:auto;
border-radius:10px;
padding:20px;
border:1px solid #ddd;
}

.user{
background:#dbeafe;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.bot{
background:#f1f5f9;
padding:12px;
border-radius:8px;
margin-bottom:10px;
white-space:pre-wrap;
}

.input-area{
display:flex;
gap:10px;
margin-top:15px;
}

#question{
flex:1;
padding:12px;
font-size:16px;
}

.send-btn{
padding:12px 20px;
background:#0a6ed1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.send-btn:hover{
background:#0854a0;
}

</style>
</head>

<body>

<header>
<h1>SAPilot 🚀</h1>
<p>Your SAP AI Consultant</p>
</header>

<div class="modules">

<button class="module-btn active" onclick="setModule(this,'all')">ALL</button>
<button class="module-btn" onclick="setModule(this,'fi')">FI</button>
<button class="module-btn" onclick="setModule(this,'co')">CO</button>
<button class="module-btn" onclick="setModule(this,'sd')">SD</button>
<button class="module-btn" onclick="setModule(this,'mm')">MM</button>
<button class="module-btn" onclick="setModule(this,'pp')">PP</button>
<button class="module-btn" onclick="setModule(this,'pm')">PM</button>
<button class="module-btn" onclick="setModule(this,'s4')">S/4HANA</button>

</div>

<div class="container">

<div id="chat">

<div class="bot">
Welcome to SAPilot.

Ask any SAP question.
</div>

</div>

<div class="input-area">

<input
id="question"
type="text"
placeholder="Ask SAP question..."
onkeypress="if(event.key==='Enter') sendMessage()">

<button class="send-btn" onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

let currentModule='all';

function setModule(button,module){

currentModule=module;

document.querySelectorAll('.module-btn')
.forEach(btn=>btn.classList.remove('active'));

button.classList.add('active');

}

async function sendMessage(){

const input=document.getElementById('question');
const question=input.value.trim();

if(!question) return;

const chat=document.getElementById('chat');

chat.innerHTML +=
`<div class="user">${question}</div>`;

chat.innerHTML +=
`<div class="bot" id="loading">Thinking...</div>`;

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch('/api/sap-chat',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
message:question,
module:currentModule
})

});

const data=await response.json();

document.getElementById('loading').remove();

chat.innerHTML +=
`<div class="bot">${data.reply}</div>`;

chat.scrollTop=chat.scrollHeight;

input.value='';

}catch(error){

document.getElementById('loading').innerHTML=
'Error connecting to SAPilot API';

}

}

</script>

</body>
</html>
